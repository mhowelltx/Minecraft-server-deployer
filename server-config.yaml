server:
  name: "Creative God-Mode Server"
  minecraft_version: "1.20.1"
  loader: "fabric" # vanilla | fabric | forge | neoforge | paper | purpur
  loader_version: "0.15.11"
  java_memory:
    min: "1G"
    max: "3G"
  motd: "Creative God-Mode Server - No Death, All Gear Unlocked"
  level_seed: ""
  difficulty: "peaceful"        # No hostile mobs, no hunger damage
  gamemode: "creative"          # Full creative mode: flight, no death, all items
  force_gamemode: true          # Force creative on every join
  pvp: false                    # No player vs player damage
  online_mode: true
  allow_flight: true            # Flight always allowed
  max_players: 10
  view_distance: 10
  simulation_distance: 10
  enable_command_block: true    # Allow command blocks for admin tools
  white_list: false
  spawn_protection: 0
  server_port: 25565
  eula: true

mod_sources:
  mode: "modrinth" # modrinth | local_only
  local_mods_dir: "local_mods"

packaging:
  output_dir: "output"
  include_docker: true
  include_start_scripts: true
